<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오션중 노담해 포토부스</title>
    <style>
        body { 
            margin: 0; 
            background: #0f4c75; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: white; 
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 540px; 
        }
        #start-btn { 
            padding: 15px 35px; 
            font-size: 22px; 
            font-weight: bold; 
            background: #3282b8; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 999; 
            margin-bottom: 15px;
            position: relative;
        }
        #start-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        #countdown { 
            display: none; 
            font-size: 120px; 
            font-weight: bold; 
            position: absolute; 
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999 !important; 
            text-shadow: 4px 4px 20px rgba(0,0,0,1); 
            color: #ffcc00;
            pointer-events: none;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            background: #000;
            z-index: 1;
        }
        #camera-view { 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        #preview-container { 
            display: none; 
            position: relative; 
            width: 100%;
            max-width: 340px; 
            aspect-ratio: 1200 / 1800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 10;
        }
        #result-canvas { 
            width: 100%; 
            height: 100%; 
            display: block;
            border-radius: 8px;
        }
        #download-btn { 
            display: none; 
            margin-top: 15px; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            background: #21bf73; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            z-index: 999; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <button id="start-btn" onclick="startPhotoBooth()" disabled>📸 카메라 준비 중...</button>
        <div id="countdown"></div>
        
        <div class="video-wrapper" id="video-box">
            <video id="camera-view" autoplay playsinline webkit-playsinline></video>
        </div>
        
        <div id="preview-container">
            <canvas id="result-canvas" width="1200" height="1800"></canvas>
        </div>
        <button id="download-btn" onclick="saveAndPrint()">💾 사진 저장하고 엡손 앱으로 인쇄하기</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const videoBox = document.getElementById('video-box');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const downloadBtn = document.getElementById('download-btn');
        const previewContainer = document.getElementById('preview-container');
        
        let shots = [];
        let shotCount = 0;

        // [변경 포인트] 프레임 이미지를 frame4.png로 변경
        const frameImg = new Image();
        frameImg.src = 'frame4.png'; 

        // 카메라 권한 요청 후 즉시 버튼 활성화
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } })
            .then(stream => { 
                video.srcObject = stream; 
                video.onloadedmetadata = () => {
                    video.play();
                    startBtn.disabled = false;
                    startBtn.innerText = "📸 촬영 시작하기";
                };
            })
            .catch(err => { 
                alert("카메라 권한을 허용해주세요."); 
                startBtn.innerText = "❌ 카메라 연결 실패";
            });

        function startPhotoBooth() {
            startBtn.classList.add('hidden');
            shots = [];
            shotCount = 0;
            takeNextShot();
        }

        function takeNextShot() {
            if (shotCount < 4) {
                let count = 3;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(timer);
                        countdownEl.style.display = 'none';
                        capture();
                        shotCount++;
                        setTimeout(takeNextShot, 1200);
                    } else {
                        countdownEl.innerText = count;
                    }
                }, 1000);
            } else {
                drawPhotos();
            }
        }

        function capture() {
