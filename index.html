<script>
        const video = document.getElementById('camera-view');
        const videoBox = document.getElementById('video-box');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const downloadBtn = document.getElementById('download-btn');
        const previewContainer = document.getElementById('preview-container');
        
        let shots = [];
        let shotCount = 0;

        // 프레임 이미지 객체 생성
        const frameImg = new Image();
        frameImg.src = 'frame4.png'; 

        // 카메라 권한 및 스트림 로드 설정 변경
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user", 
                    width: { ideal: 640 }, 
                    height: { ideal: 480 } 
                } 
            })
            .then(stream => { 
                // 비디오 소스에 스트림 주입
                video.srcObject = stream; 
                
                // 모바일 브라우저 무한 대기 방지를 위한 속성 강제 부여
                video.setAttribute('playsinline', true);
                video.setAttribute('webkit-playsinline', true);
                video.muted = true; // 일부 모바일 브라우저 필수 정책
                
                // loadedmetadata가 안 먹힐 경우를 대비해 play() 직접 호출 시도
                video.play().then(() => {
                    startBtn.disabled = false;
                    startBtn.innerText = "📸 촬영 시작하기";
                }).catch(playErr => {
                    console.error("자동 재생 차단됨:", playErr);
                    // 터치 후 재생되도록 버튼 활성화
                    startBtn.disabled = false;
                    startBtn.innerText = "📸 촬영 시작하기 (클릭)";
                });
            })
            .catch(err => { 
                // '카메라 준비 중'에서 안 넘어갈 때 정확히 어떤 에러인지 팝업을 띄웁니다.
                alert("카메라 연결 실패!\n에러 종류: " + err.name + "\n메시지: " + err.message + 
                      "\n\n※ 주소가 https:// 로 시작하는지, 혹은 다른 카메라 앱이 켜져 있는지 확인해 주세요."); 
                startBtn.innerText = "❌ 카메라 연결 실패";
            });
        } else {
            alert("이 브라우저나 환경에서는 카메라 기능을 지원하지 않습니다. (HTTPS 연결 확인 필요)");
            startBtn.innerText = "❌ 기능 미지원 브라우저";
        }

        function startPhotoBooth() {
            // 영상이 멈춰있다면 다시 한번 재생 강제
            if (video.paused) {
                video.play();
            }
            startBtn.classList.add('hidden');
            shots = [];
            shotCount = 0;
            takeNextShot();
        }

        function takeNextShot() {
            if (shotCount < 4) {
                let count = 3;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(timer);
                        countdownEl.style.display = 'none';
                        capture();
                        shotCount++;
                        setTimeout(takeNextShot, 1200);
                    } else {
                        countdownEl.innerText = count;
                    }
                }, 1000);
            } else {
                drawPhotos();
            }
        }

        function capture() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 480;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.translate(640, 0);
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(video, 0, 0, 640, 480);
            shots.push(tempCanvas);
        }

        function drawPhotos() {
            videoBox.classList.add('hidden');
            previewContainer.style.display = 'block';
            downloadBtn.style.display = 'block';

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (frameImg.complete) {
                renderAll();
            } else {
                frameImg.onload = renderAll;
            }
        }

        function renderAll() {
            try {
                ctx.drawImage(frameImg, 0, 0, 1200, 1800);
            } catch(e) {
                console.error("프레임 이미지를 그리지 못했습니다.", e);
            }

            const positions = [
                {x: 80, y: 450},   
                {x: 620, y: 450},  
                {x: 80, y: 1100},
                {x: 620, y: 1100}
            ];

            shots.forEach((shot, index) => {
                if(positions[index]) {
                    const srcWidth = 387; 
                    const srcHeight = 480;
                    const srcX = (640 - srcWidth) / 2;
                    const srcY = 0;

                    ctx.drawImage(
                        shot, 
                        srcX, srcY, srcWidth, srcHeight, 
                        positions[index].x, positions[index].y, 500, 620
                    );
                }
            });
        }

        function saveAndPrint() {
            const link = document.createElement('a');
            link.download = `nodam_photo_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            alert("📸 사진이 갤럭시 탭에 저장되었습니다!\n\n[갤러리] 앱을 열어 방금 저장된 사진을 선택한 뒤, 공유 기능을 통해 'Epson Creative Print' 앱으로 전송하여 인쇄하세요!");
        }
    </script>
